<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover, orientation=portrait">
  <title>El Portal • Para Arly con amor</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: radial-gradient(ellipse at center, #0b0f1c 0%, #1a1a2e 100%);
      font-family: 'Georgia', 'Times New Roman', serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 12px;
      margin: 0;
      overflow-x: hidden;
      position: relative;
    }

    /* ========== NIEBLA DE FONDO ========== */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(0deg, rgba(255,255,240,0.03) 0px, rgba(255,255,240,0.03) 2px, transparent 2px, transparent 8px);
      pointer-events: none;
      z-index: 0;
    }

    /* Luna flotante */
    .moon {
      position: fixed;
      top: 5%;
      right: -60px;
      font-size: 5rem;
      opacity: 0.7;
      z-index: 0;
      animation: moonFloat 30s linear infinite;
    }
    @keyframes moonFloat {
      0% { transform: translateX(0) rotate(0deg); }
      100% { transform: translateX(-120vw) rotate(20deg); }
    }

    /* Estrellas generadas por JS */
    .stars {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }
    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      box-shadow: 0 0 6px #ffd966;
      animation: twinkle 2s infinite alternate;
    }
    @keyframes twinkle {
      0% { opacity: 0.3; transform: scale(0.8); }
      100% { opacity: 1; transform: scale(1.2); }
    }

    /* Gato negro */
    .ghost-cat {
      position: fixed;
      bottom: 15%;
      left: -100px;
      font-size: 3.5rem;
      opacity: 0;
      z-index: 5;
      pointer-events: none;
      animation: catWalk 22s infinite linear;
      filter: drop-shadow(0 0 10px #6a0dad);
    }
    @keyframes catWalk {
      0% { left: -100px; opacity: 0; }
      5% { opacity: 0.6; }
      95% { opacity: 0.6; }
      100% { left: 110%; opacity: 0; }
    }

    /* Llaves antiguas */
    .floating-keys {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }
    .key {
      position: absolute;
      bottom: -40px;
      font-size: 2rem;
      opacity: 0;
      animation: floatKey 15s infinite;
      color: #b8860b;
      text-shadow: 0 0 10px #daa520;
    }
    @keyframes floatKey {
      0% { transform: translateY(0) rotate(0deg) scale(0.6); opacity: 0; }
      10% { opacity: 0.8; }
      80% { opacity: 0.2; }
      100% { transform: translateY(-110vh) rotate(180deg) scale(1.2); opacity: 0; }
    }
    .key:nth-child(1) { left: 5%; animation-delay: 0s; }
    .key:nth-child(2) { left: 20%; animation-delay: 3s; }
    .key:nth-child(3) { left: 40%; animation-delay: 6s; }
    .key:nth-child(4) { left: 60%; animation-delay: 9s; }
    .key:nth-child(5) { left: 80%; animation-delay: 12s; }

    /* Botones flotantes */
    .floating-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }
    .floating-button {
      position: absolute;
      bottom: -40px;
      font-size: 1.8rem;
      opacity: 0;
      animation: floatButton 13s infinite;
      color: #e6b422;
      text-shadow: 0 0 10px #ffb347;
      transform-origin: center;
    }
    @keyframes floatButton {
      0% { transform: translateY(0) rotate(0deg) scale(0.7); opacity: 0; }
      10% { opacity: 0.9; }
      85% { opacity: 0.2; }
      100% { transform: translateY(-110vh) rotate(360deg) scale(1.3); opacity: 0; }
    }
    .btn1 { left: 3%; animation-delay: 0s; }
    .btn2 { left: 15%; animation-delay: 2s; }
    .btn3 { left: 30%; animation-delay: 4.5s; }
    .btn4 { left: 45%; animation-delay: 7s; }
    .btn5 { left: 60%; animation-delay: 1.5s; }
    .btn6 { left: 75%; animation-delay: 5.5s; }
    .btn7 { left: 90%; animation-delay: 8s; }
    .btn8 { left: 10%; animation-delay: 10s; }

    /* 💖 NUEVA LLUVIA DE CORAZONES Y MENSAJES DE AMOR 💖 */
    .love-rain {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }
    .love-drop {
      position: absolute;
      font-size: 2rem;
      opacity: 0;
      animation: loveFall linear infinite;
    }
    @keyframes loveFall {
      0% { transform: translateY(0) rotate(0deg) scale(0.5); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 0.5; }
      100% { transform: translateY(110vh) rotate(360deg) scale(1); opacity: 0; }
    }
    /* Distribución y colores */
    .love-drop:nth-child(1) { left: 5%; animation-duration: 7s; animation-delay: 0s; color: #ff6b81; }
    .love-drop:nth-child(2) { left: 12%; animation-duration: 9s; animation-delay: 1s; color: #ff3366; }
    .love-drop:nth-child(3) { left: 20%; animation-duration: 8s; animation-delay: 2s; color: #ff6b81; }
    .love-drop:nth-child(4) { left: 30%; animation-duration: 10s; animation-delay: 0.5s; color: #ff85a1; }
    .love-drop:nth-child(5) { left: 40%; animation-duration: 7.5s; animation-delay: 1.5s; color: #ff3366; }
    .love-drop:nth-child(6) { left: 50%; animation-duration: 9.5s; animation-delay: 2.5s; color: #ff6b81; }
    .love-drop:nth-child(7) { left: 60%; animation-duration: 8.5s; animation-delay: 0.8s; color: #ff85a1; }
    .love-drop:nth-child(8) { left: 70%; animation-duration: 10.5s; animation-delay: 1.8s; color: #ff3366; }
    .love-drop:nth-child(9) { left: 80%; animation-duration: 7.8s; animation-delay: 2.2s; color: #ff6b81; }
    .love-drop:nth-child(10){ left: 90%; animation-duration: 9.2s; animation-delay: 0.3s; color: #ff85a1; }
    .love-drop:nth-child(11){ left: 15%; animation-duration: 8.3s; animation-delay: 3s; color: #ff6b81; }
    .love-drop:nth-child(12){ left: 35%; animation-duration: 9.8s; animation-delay: 2s; color: #ff3366; }
    .love-drop:nth-child(13){ left: 55%; animation-duration: 7.2s; animation-delay: 1.2s; color: #ff6b81; }
    .love-drop:nth-child(14){ left: 75%; animation-duration: 8.7s; animation-delay: 2.8s; color: #ff85a1; }
    .love-drop:nth-child(15){ left: 95%; animation-duration: 9.4s; animation-delay: 0.6s; color: #ff3366; }

    /* ========== TARJETA PRINCIPAL ========== */
    .storybook {
      background: #1c1b26;
      border: 3px solid #5a3a5a;
      border-radius: 32px;
      width: 100%;
      max-width: 500px;
      padding: 20px 16px 24px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.7), 0 0 30px rgba(106,13,173,0.3);
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      position: relative;
      overflow: hidden;
    }
    .storybook::before {
      content: "";
      position: absolute;
      top: 10px;
      left: 10px;
      right: 10px;
      bottom: 10px;
      border: 1px dashed #e6b422;
      border-radius: 24px;
      opacity: 0.4;
      pointer-events: none;
    }
    .title {
      color: #e6b422;
      text-align: center;
      font-family: 'Courier New', monospace;
      font-size: 1.5rem;
      letter-spacing: 2px;
      text-shadow: 0 0 8px #b36b1e;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* Panel cuadrado para las imágenes */
    .comic-panel {
      width: 100%;
      aspect-ratio: 1 / 1;
      max-width: 400px;
      background: #0b0f1c;
      border: 2px solid #5a3a5a;
      border-radius: 20px;
      position: relative;
      overflow: hidden;
      box-shadow: inset 0 0 20px #000;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .comic-scene {
      position: absolute;
      width: 100%;
      height: 100%;
      opacity: 0;
      pointer-events: none;
      transition: opacity 1s ease;
    }
    .comic-scene.active {
      opacity: 1;
      pointer-events: auto;
    }
    .comic-scene img {
      width: 100%;
      height: 100%;
      object-fit: cover;   /* La imagen cubre todo el cuadrado */
    }

    /* Sorpresa final (Te amo, Arly) */
    .surprise-message {
      position: absolute;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at center, #1a0a1a, #000);
      opacity: 0;
      pointer-events: none;
      transition: opacity 1s ease;
      flex-direction: column;
      gap: 15px;
      z-index: 10;
    }
    .surprise-message.active {
      opacity: 1;
      pointer-events: auto;
    }
    .surprise-text {
      font-size: 2.5rem;
      color: #e6b422;
      text-shadow: 0 0 15px #b36b1e;
      font-family: 'Courier New', monospace;
      animation: pulseText 1.5s infinite;
    }
    @keyframes pulseText {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); text-shadow: 0 0 25px #ffb347; }
      100% { transform: scale(1); }
    }
    .button-heart {
      font-size: 3rem;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
      100% { transform: translateY(0); }
    }

    /* Subtítulos */
    .subtitle-panel {
      text-align: center;
      font-size: 0.9rem;
      color: #b8a9c9;
      font-style: italic;
      padding: 6px;
      border-top: 1px solid #5a3a5a;
      width: 100%;
      min-height: 30px;
    }

    /* Controles */
    .audio-controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
    }
    button {
      background: #6a0dad;
      border: none;
      color: #ffe5b4;
      font-weight: bold;
      padding: 12px 24px;
      border-radius: 40px;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 4px 12px rgba(106,13,173,0.5);
      border: 1px solid #e6b422;
    }
    button:hover { background: #7f1fbf; transform: translateY(-2px); }
    .time-display { color: #a0b9ce; font-size: 0.8rem; font-family: monospace; }
    .hidden-player { width: 0; height: 0; opacity: 0; position: absolute; }
    .footer-note { color: #8aa0b5; text-align: center; font-size: 0.75rem; margin-top: 4px; }
  </style>
</head>

<script>
  // Crear estrellas
  (function createStars() {
    const container = document.getElementById('starsContainer');
    for (let i = 0; i < 30; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      star.style.left = Math.random() * 100 + '%';
      star.style.top = Math.random() * 100 + '%';
      star.style.width = Math.random() * 4 + 2 + 'px';
      star.style.height = star.style.width;
      star.style.animationDelay = Math.random() * 2 + 's';
      container.appendChild(star);
    }
  })();

  // ========== CONFIGURACIÓN ==========
  const YOUTUBE_VIDEO_ID = 'g_KISC8-bG8';

  // Subtítulos (letra real)
  const subtitleTimeline = [
    { time: 0.0, text: "(Instrumental)" },
    { time: 5.5, text: "Suli au len" },
    { time: 10.0, text: "Le je le fanilé jenti" },
    { time: 15.7, text: "Amen zun don" },
    { time: 21.2, text: "Antwo daltan" },
    { time: 26.1, text: "Felice se li mue" },
    { time: 36.0, text: "Ovinue le" },
    { time: 38.2, text: "Enderi me suva" },
    { time: 43.3, text: "Ovinue le" },
    { time: 47.2, text: "Enderi me sutrim" },
    { time: 75.5, text: "Twee de da da..." },
    { time: 80.7, text: "Suli au len" },
    { time: 84.4, text: "Le je le fanilé jencli" },
    { time: 89.7, text: "Amen zin don" },
    { time: 95.6, text: "Antwo daltan (twee de da da...)" },
    { time: 100.8, text: "Felice se li mue" },
    { time: 106.2, text: "Wilo samwe (twee de da da...)" },
    { time: 111.4, text: "Melindaatje li mue" },
    { time: 120.0, text: "(Fin)" }
  ];

  // 9 viñetas, ahora usando imágenes
  const sceneChanges = [
    { time: 0,   sceneId: 'scene1' },
    { time: 8,   sceneId: 'scene2' },
    { time: 18,  sceneId: 'scene3' },
    { time: 30,  sceneId: 'scene4' },
    { time: 42,  sceneId: 'scene5' },
    { time: 56,  sceneId: 'scene6' },
    { time: 72,  sceneId: 'scene7' },
    { time: 88,  sceneId: 'scene8' },
    { time: 102, sceneId: 'scene9' }
  ];

  let player;
  let currentScene = 'scene1';
  let lastSubtitle = '';
  let surpriseShown = false;

  const subtitleEl = document.getElementById('subtitleText');
  const timeDisplay = document.getElementById('timeDisplay');
  const playButton = document.getElementById('playButton');
  const surpriseEl = document.getElementById('surpriseMessage');

  // YouTube API
  const tag = document.createElement('script');
  tag.src = "https://www.youtube.com/iframe_api";
  document.head.appendChild(tag);

  function onYouTubeIframeAPIReady() {
    player = new YT.Player('player', {
      videoId: YOUTUBE_VIDEO_ID,
      playerVars: {
        autoplay: 0,
        controls: 0,
        modestbranding: 1,
        rel: 0,
        fs: 0,
        playsinline: 1,
        disablekb: 1
      },
      events: {
        'onReady': onPlayerReady,
        'onStateChange': onPlayerStateChange
      }
    });
  }

  function onPlayerReady() {
    playButton.addEventListener('click', () => {
      if (player.getPlayerState() === YT.PlayerState.PLAYING) {
        player.pauseVideo();
        playButton.innerHTML = '▶️ Continuar viaje';
      } else {
        player.playVideo();
        playButton.innerHTML = '⏸️ Pausar';
      }
    });
  }

  let syncInterval;
  function onPlayerStateChange(event) {
    if (event.data === YT.PlayerState.PLAYING) {
      playButton.innerHTML = '⏸️ Pausar';
      syncInterval = setInterval(updateTimeline, 200);
    } else if (event.data === YT.PlayerState.PAUSED) {
      playButton.innerHTML = '▶️ Continuar viaje';
      clearInterval(syncInterval);
    } else if (event.data === YT.PlayerState.ENDED) {
      playButton.innerHTML = '🔄 Viajar de nuevo';
      clearInterval(syncInterval);
      showSurprise();
    }
  }

  function updateTimeline() {
    if (!player || !player.getCurrentTime) return;
    const currentTime = player.getCurrentTime();
    timeDisplay.textContent = formatTime(currentTime);

    // Subtítulos
    let subEntry = null;
    for (let i = subtitleTimeline.length - 1; i >= 0; i--) {
      if (currentTime >= subtitleTimeline[i].time) {
        subEntry = subtitleTimeline[i];
        break;
      }
    }
    if (subEntry && subEntry.text !== lastSubtitle) {
      subtitleEl.textContent = subEntry.text;
      lastSubtitle = subEntry.text;
    }

    // Cambio de escena
    let newScene = currentScene;
    for (let i = sceneChanges.length - 1; i >= 0; i--) {
      if (currentTime >= sceneChanges[i].time) {
        newScene = sceneChanges[i].sceneId;
        break;
      }
    }
    if (newScene !== currentScene) {
      document.querySelectorAll('.comic-scene').forEach(el => el.classList.remove('active'));
      const activeEl = document.getElementById(newScene);
      if (activeEl) activeEl.classList.add('active');
      currentScene = newScene;
    }

    // Mostrar sorpresa cuando la canción termine (a partir del segundo 125)
    if (currentTime >= 125 && !surpriseShown) {
      showSurprise();
    }
  }

  function showSurprise() {
    if (surpriseShown) return;
    document.querySelectorAll('.comic-scene').forEach(el => el.classList.remove('active'));
    surpriseEl.classList.add('active');
    surpriseShown = true;
    playButton.innerHTML = '🔄 Viajar de nuevo';
  }

  function formatTime(s) {
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60);
    return `${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
  }

  window.addEventListener('beforeunload', () => clearInterval(syncInterval));
</script>
</body>
</html>
